<div class="lobby-overlay">
  <div class="glass-card" style="min-width: 400px">
    <h1 class="lobby-title">{{ t('lobby.title') }}</h1>
    <p class="lobby-desc">{{ t('lobby.subtitle') }}</p>

    <div class="form-group">
      <label>{{ t('lobby.playerName') }}</label>
      <input
        type="text"
        [(ngModel)]="playerName"
        (keyup.enter)="joinRoom()"
        [placeholder]="t('lobby.playerNamePlaceholder')"
        class="form-input"
        autofocus
      />
    </div>

    <div class="form-group">
      <label>{{ t('lobby.roomId') }}</label>
      <input type="text" [(ngModel)]="roomId" (keyup.enter)="joinRoom()" class="form-input" />
    </div>

    <div class="button-group" style="display: flex; flex-direction: column; gap: 10px">
      <button (click)="joinRoom()" class="btn-primary" style="width: 100%">{{ t('lobby.joinRoom') }}</button>
      <div style="display: flex; gap: 10px; width: 100%">
        <button
          (click)="navigateToLamiLobby()"
          class="btn-secondary"
          style="flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2)"
        >
          {{ t('login.goToLami') }}
        </button>
        <button
          (click)="navigateToDizhuLobby()"
          class="btn-secondary"
          style="flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2)"
        >
          {{ t('dizhu.lobbyTitle') }}
        </button>
      </div>
    </div>
  </div>
</div>
