<div class="lobby-overlay" style="position: relative; flex: 1; height: 100%;">
  <div class="glass-card" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
    <h1 class="lobby-title">{{ t('lobby.title') }}</h1>
    <p class="lobby-desc">{{ t('lobby.subtitle') }}</p>

    <div class="form-group">
      <label>{{ t('lobby.playerName') }}</label>
      <input
        type="text"
        [(ngModel)]="playerName"
        (keyup.enter)="joinRoom()"
        [placeholder]="t('lobby.playerNamePlaceholder')"
        class="form-input"
        autofocus
      />
    </div>

    <div class="form-group">
      <label>{{ t('lobby.roomId') }}</label>
      <input type="text" [(ngModel)]="roomId" (keyup.enter)="joinRoom()" class="form-input" />
    </div>

    <div class="button-group">
      <button (click)="joinRoom()" class="btn-primary">{{ t('lobby.joinRoom') }}</button>
    </div>
  </div>
</div>
